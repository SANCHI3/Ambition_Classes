<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#0f7c82,#4b2e83);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}
.login-box{
width:380px;
background:white;
padding:40px;
border-radius:15px;
text-align:center;
}
</style>
</head>

<body>

<div class="login-box">
<h4>Admin Login</h4>

<input id="username" class="form-control mb-3" placeholder="Admin Username">
<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn btn-primary w-100">Login</button>

<p id="msg" class="text-danger mt-2"></p>
</div>

<script>
const BASE_URL = "https://ambition-classes-backend.onrender.com";

async function login(){

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    msg.innerText = ""; // clear old message

    // 🔥 BASIC VALIDATION
    if(!username || !password){
        msg.innerText = "Enter username and password";
        return;
    }

    try{
        const res = await fetch(`${BASE_URL}/api/users/login`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username, password})
        });

        if(!res.ok){
            msg.innerText = "Invalid credentials";
            return;
        }

        const user = await res.json();

        console.log("LOGIN USER:", user); // 🔥 DEBUG

        // 🔥 SAVE USER
        localStorage.setItem("user", JSON.stringify(user));

        // 🔥 FIRST LOGIN
        if(user.firstLogin){
            window.location.href = "change-password.html";
            return;
        }

        // 🔥 ROLE BASED REDIRECT (SAFE)
        const role = user.role?.toLowerCase();

        if(role === "admin"){
            window.location.href = "admin-dashboard.html";
        }
        else if(role === "student"){
            window.location.href = "student-dashboard.html";
        }
        else if(role === "parent"){
            window.location.href = "parent-dashboard.html";
        }
        else{
            msg.innerText = "Unknown role";
        }

    } catch(err){
        console.error(err);
        msg.innerText = "Server error. Try again.";
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#0f7c82,#4b2e83);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}
.login-box{
width:380px;
background:white;
padding:40px;
border-radius:15px;
text-align:center;
}
</style>
</head>

<body>

<div class="login-box">
<h4>Admin Login</h4>

<input id="username" class="form-control mb-3" placeholder="Admin Username">
<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn btn-primary w-100">Login</button>

<p id="msg" class="text-danger mt-2"></p>
</div>

<script>
    const BASE_URL = "https://ambition-classes-backend.onrender.com";
async function login(){

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch(`${BASE_URL}/api/users/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username, password})
    });

    const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "student"){
    window.location.href = "admin-login.html";
}

    if(!res.ok){
        alert("Invalid credentials");
        return;
    }

    const user = await res.json();

    localStorage.setItem("user", JSON.stringify(user));

    // 🔥 FIRST LOGIN CHECK
    if(user.firstLogin){
        window.location.href = "change-password.html";
        return;
    }

    // 🔥 ROLE BASED REDIRECTION
    if(user.role === "admin"){
        window.location.href = "admin-dashboard.html";
    }
    else if(user.role === "student"){
        window.location.href = "student-dashboard.html";
    }
    else if(user.role === "parent"){
        window.location.href = "parent-dashboard.html";
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Parent Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
font-family:'Segoe UI',sans-serif;
}

.sidebar{
height:100vh;
width:230px;
background:#0f7c82;
position:fixed;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px 20px;
}

.sidebar a:hover{
background:#0a5c60;
}

.main{
margin-left:230px;
padding:30px;
}

.dashboard-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
}

.dashboard-card h3{
color:#4b2e83;
font-weight:bold;
}

.table-box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-top:30px;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
<h4>Parent Panel</h4>
<a href="#">Dashboard</a>
<a href="#">Attendance</a>
<a href="#">Test Results</a>
<a href="#">Fees Status</a>
<a href="#" onclick="goToChangePassword()">Change Password</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<!-- Main -->
<div class="main">

<h2 class="mb-4">Parent Dashboard</h2>
<div class="mb-3">
    <label>Select Child:</label>
    <select id="childSelect" class="form-control"></select>
</div>

<div class="row g-4">

<div class="col-md-4">
<div class="dashboard-card">
<h5>Attendance</h5>
<h3 id="attendancePercent">0%</h3>
</div>
</div>

<div class="col-md-4">
<div class="dashboard-card">
<h5>Latest Test Marks</h5>
<h3 id="latestMarks">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="dashboard-card">
<h5>Fees Status</h5>
<h3 id="feesStatus">Pending</h3>
<p id="remainingFees" style="margin:0;"></p>
</div>
</div>

</div>

<!-- Test Results -->
<div class="table-box">
<h4 class="mb-3">Recent Test Results</h4>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>Test Name</th>
<th>Marks</th>
</tr>
</thead>

<tbody id="resultTable"></tbody>

</table>
</div>

</div>

<script>
const BASE_URL = "https://ambition-classes-backend.onrender.com";
// ✅ GET USER (ONLY ONCE)
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
    alert("Login first");
    window.location.href = "parent-login.html";
}

// =======================
// 👶 LOAD CHILDREN DROPDOWN
// =======================

async function loadChildren(){

    const select = document.getElementById("childSelect");

    if(!user.children || user.children.length === 0){
        select.innerHTML = `<option>No children found</option>`;
        return;
    }

    let html = "";

    for(const mobile of user.children){

        try{
           const res = await fetch(`${BASE_URL}/api/student/mobile/${childMobile}`);
            const data = await res.json();

            html += `<option value="${mobile}">
                        ${data.name} (${data.className})
                     </option>`;
        }
        catch(e){
            html += `<option value="${mobile}">
                        ${mobile}
                     </option>`;
        }
    }

    select.innerHTML = html;
}

// =======================
// 🔁 GET SELECTED CHILD
// =======================

function getSelectedChild(){
    return document.getElementById("childSelect").value;
}

// =======================
// 📊 LOAD RESULTS
// =======================

async function loadResults(){

    const res = await fetch(`${BASE_URL}/api/results/student/${getSelectedChild()}`);
    const data = await res.json();

    let html = "";

    data.reverse().forEach(r => {
        html += `
            <tr>
                <td>${r.testName || "No Test"}</td>
                <td>${r.marks}</td>
            </tr>
        `;
    });

    document.getElementById("resultTable").innerHTML = html;

    if(data.length > 0){
        document.getElementById("latestMarks").innerText =
            data[data.length - 1].marks;
    }
}

// =======================
// 📅 LOAD ATTENDANCE
// =======================

async function loadAttendance(){

    const res = await fetch(`${BASE_URL}/api/attendance/student/${getSelectedChild()}`);
    const data = await res.json();

    const total = data.length;
    const present = data.filter(a => a.status === "Present").length;

    const percent = total === 0 ? 0 : Math.round((present / total) * 100);

    document.getElementById("attendancePercent").innerText = percent + "%";
}

// =======================
// 💰 LOAD FEES
// =======================

async function loadFees(){

    const res = await fetch(`${BASE_URL}/api/student/mobile/${getSelectedChild()}`);
    const data = await res.json();

    const remaining = data.totalFees - data.paidAmount;

    let status = "";

    if(data.paidAmount >= data.totalFees){
        status = "Paid";
    }
    else if(data.paidAmount > 0){
        status = "Partial";
    }
    else{
        status = "Pending";
    }

    const el = document.getElementById("feesStatus");
    const rem = document.getElementById("remainingFees");

    el.innerText = status;

    // 🎨 COLORS
    if(status === "Paid") el.style.color = "green";
    else if(status === "Partial") el.style.color = "orange";
    else el.style.color = "red";

    // 💰 SHOW REMAINING
    if(remaining > 0){
        rem.innerText = `Remaining: ₹${remaining}`;
        rem.style.color = "red";
    } else {
        rem.innerText = "All fees paid ✅";
        rem.style.color = "green";
    }
}

// =======================
// 🔄 ON CHANGE SWITCH CHILD
// =======================

document.getElementById("childSelect").addEventListener("change", () => {
    loadResults();
    loadAttendance();
    loadFees();
});

// =======================
// 🚀 INITIAL LOAD
// =======================

loadChildren();
setTimeout(() => {   // wait for dropdown to fill
    loadResults();
    loadAttendance();
    loadFees();
}, 100);

</script>
<script>
function goToChangePassword(){
    window.location.href = "change-password.html";
}

function logout(){
    localStorage.removeItem("user");
    window.location.href = "parent-login.html";
}
</script>
</body>
</html>

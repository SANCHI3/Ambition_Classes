<!-- MOCK TEST -->

<div class="container">

<div class="question-box">
    <h5 class="mb-2 text-primary">Select Test to Start</h5>

<select id="studentTestSelect" class="form-control mb-3" onchange="loadTestQuestions()">
    <option value="">Select Test</option>
</select>

<p id="selectMsg">Please select a test to begin</p>

<!-- 🔴 WRAP THIS -->
<div id="testSection" style="display:none;">

    <h6>Question Palette</h6>
    <div id="paletteButtons" class="palette mb-4"></div>

    <p id="progress" class="text-muted"></p>

    <h5 id="questionText"></h5>

    <div class="mt-3">
        <label><input type="radio" name="option" value="0"> <span id="opt0"></span></label><br>
        <label><input type="radio" name="option" value="1"> <span id="opt1"></span></label><br>
        <label><input type="radio" name="option" value="2"> <span id="opt2"></span></label><br>
        <label><input type="radio" name="option" value="3"> <span id="opt3"></span></label>
    </div>

    <div class="mt-4">
        <button onclick="prevQuestion()" class="btn btn-warning">Previous</button>
        <button onclick="nextQuestion()" class="btn btn-info">Next</button>
        <button onclick="submitTest()" class="btn btn-primary">Submit Test</button>
    </div>

</div>

<h3 class="text-center mt-4" id="score"></h3>

</div>

<script>

let questions = [];

let currentQuestion = 0;

let answers = new Array(questions.length).fill(null);

function loadTestsForStudents(){

    fetch("http://localhost:8080/api/tests")
    .then(res => res.json())
    .then(data => {

        let dropdown = document.getElementById("studentTestSelect");

        dropdown.innerHTML = "<option value=''>Select Test</option>";

        data.forEach(t => {
            dropdown.innerHTML += `
                <option value="${t.id}">${t.name}</option>
            `;
        });

    });
}

function loadTestQuestions(){

    let testId = document.getElementById("studentTestSelect").value;

    if(testId === ""){
    document.getElementById("testSection").style.display = "none";
    return;
}

    fetch("http://localhost:8080/api/tests")
    .then(res => res.json())
    .then(data => {

        let selectedTest = data.find(t => t.id === testId);

        console.log("SELECTED TEST:", selectedTest);

        if(!selectedTest){
            alert("Test not found");
            return;
        }

        // 🔥 SET QUESTIONS FROM BACKEND
        questions = selectedTest.questions || [];

        document.getElementById("testSection").style.display = "block";

        currentQuestion = 0;
        answers = new Array(questions.length).fill(null);

        generatePalette();
        loadQuestion();
    });
}

function loadQuestion(){

if(questions.length === 0){
    document.getElementById("questionText").innerHTML = `
        <div style="text-align:center; padding:40px;">
            <h4>No Test Selected</h4>
            <p>Please select a test from above</p>
        </div>
    `;

    document.getElementById("progress").innerText = "";

    // hide options
    document.querySelectorAll('input[name="option"]').forEach(r => r.parentElement.style.display = "none");

    return;
}

let q = questions[currentQuestion];

console.log("CURRENT QUESTION:", q);


document.getElementById("questionText").innerText =
"Q"+(currentQuestion+1)+". "+q.question;

document.getElementById("opt0").innerText = q.options[0];
document.getElementById("opt1").innerText = q.options[1];
document.getElementById("opt2").innerText = q.options[2];
document.getElementById("opt3").innerText = q.options[3];

document.querySelectorAll('input[name="option"]').forEach(r => r.parentElement.style.display = "block");

let radios = document.getElementsByName("option");

radios.forEach(r => r.checked = false);

if(answers[currentQuestion] !== null){
radios[answers[currentQuestion]].checked = true;
}

updatePalette();   // ⭐ THIS LINE WAS MISSING

}

function saveAnswer(){

let selected = document.querySelector('input[name="option"]:checked');

if(selected){
answers[currentQuestion] = parseInt(selected.value);
}

}

function nextQuestion(){

saveAnswer();

if(currentQuestion < questions.length-1){
currentQuestion++;
loadQuestion();
}

}

function prevQuestion(){

saveAnswer();

if(currentQuestion > 0){
currentQuestion--;
loadQuestion();
}

}

function submitTest(){

saveAnswer();

let score = 0;
let labels = ["A","B","C","D"];

for(let i=0;i<questions.length;i++){
if(answers[i] == questions[i].correct){
score++;
}
}

let resultHTML = `
<div class="container mt-5">

<div class="card text-center shadow-sm mb-5 p-4">
<h2>Test Result</h2>
<h1 style="color:#0f7c82">${score} / ${questions.length}</h1>
<p>Score: ${(score/questions.length*100).toFixed(1)}%</p>
</div>
`;

for(let i=0;i<questions.length;i++){

let q = questions[i];
let userAnswer = answers[i];
let correct = q.correct;

resultHTML += `
<div class="card mb-4 shadow-sm">
<div class="card-body">

<h5 class="mb-4">Q${i+1}. ${q.question}</h5>
`;

for(let j=0;j<4;j++){

let style = "padding:10px;border-radius:6px;margin-bottom:8px;";
let text = `${labels[j]}) ${q.options[j]}`;

if(j == correct){
style += "background:#d4edda;color:#155724;font-weight:600;";
text += " ✔ Correct Answer";
}

if(j == userAnswer && j != correct){
style += "background:#f8d7da;color:#721c24;font-weight:600;";
text += " ❌ Your Answer";
}

resultHTML += `<div style="${style}">${text}</div>`;
}

resultHTML += `</div></div>`;
}

resultHTML += `</div>`;

document.body.innerHTML = resultHTML;

}



function generatePalette(){

let palette = document.getElementById("paletteButtons");

palette.innerHTML = "";

for(let i=0;i<questions.length;i++){

let btn = document.createElement("button");

btn.innerText = i+1;

btn.classList.add("notVisited");

btn.onclick = function(){

saveAnswer();

currentQuestion = i;

loadQuestion();

updatePalette();

}

palette.appendChild(btn);

}

}

function updatePalette(){

let buttons = document.querySelectorAll("#paletteButtons button");

buttons.forEach((btn,i)=>{

btn.classList.remove("answered","notVisited","current");

if(answers[i] !== null){
btn.classList.add("answered");
}else{
btn.classList.add("notVisited");
}

if(i === currentQuestion){
btn.classList.add("current");
}

});

}

window.onload = function(){
    loadTestsForStudents();
};

</script>

<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#0f7c82,#4b2e83);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}
.box{
width:350px;
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="box">
<h4>Change Password</h4>

<input type="password" id="newPassword" class="form-control mb-3" placeholder="New Password">

<button onclick="changePassword()" class="btn btn-primary w-100">Update</button>

<p id="msg" class="text-danger mt-2"></p>
</div>

<script>
function changePassword(){

    const password = document.getElementById("newPassword").value;

    // 🔥 get logged in user
    const user = JSON.parse(localStorage.getItem("user"));
    const username = user ? user.username : null;

    fetch("https://ambition-classes-backend.onrender.com/api/users/change-password", {
    method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            newPassword: password
        })
    })
    .then(res => {
        if(!res.ok){
            throw new Error("Failed");
        }
        return res.text();
    })
    .then(msg => {
        alert("Password updated successfully");

        // redirect after change
        const user = JSON.parse(localStorage.getItem("user"));

        if(user.role === "admin"){
            window.location.href = "admin-dashboard.html";
        }
        else if(user.role === "student"){
            window.location.href = "student-dashboard.html";
        }
        else if(user.role === "parent"){
            window.location.href = "parent-dashboard.html";
        }// or student-dashboard
    })
    .catch(err => {
        console.error(err);
        document.getElementById("error").innerText = "Error updating password";
    });
}
</script>

</body>
</html>
